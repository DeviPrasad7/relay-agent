agent:
  tick_interval_seconds: 60
  retention_days: 7
  incident_report_dir: "/data/incidents"
  markdown_report_dir: "/data/reports"

detection:
  error_spike:
    window_minutes: 5
    baseline_window_minutes: 30
    std_dev_multiplier: 2.0
  latency_degrade:
    window_minutes: 5
    baseline_window_minutes: 30
    threshold_multiplier: 2.0
  heartbeat:
    timeout_seconds: 60
    service_timeouts:
      auth-service: 30      # more strict for critical services
      payment-service: 90   # more lenient

llm:
  model: "deepseek-chat"
  max_tokens_per_call: 1000
  cache_ttl_hours: 24
  token_limit_total: 4500000
  api_timeout_seconds: 30

services:
  - name: auth-service
  - name: payment-service

storage:
  sqlite_path: "/data/relay.db"
  max_open_conns: 1
