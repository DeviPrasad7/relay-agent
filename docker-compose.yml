version: '3.8'
services:
  relay-agent:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER=mock
      - DEEPSEEK_API_KEY=dummy   # optional, silences warning
    volumes:
      - ./data:/data
      - ./configs/config.yaml:/root/configs/config.yaml
    restart: unless-stopped
